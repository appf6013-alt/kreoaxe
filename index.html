<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KREOAXE | Digital. Creative. Performance.</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #050505; color: #fff; line-height: 1.6; }
        
        /* Hero */
        .hero { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), #111; }
        .hero h1 { font-size: 3.5rem; letter-spacing: 4px; color: #fff; }
        
        /* Clients Section */
        .clients { padding: 80px 20px; text-align: center; background: #0a0a0a; }
        .clients h2 { font-size: 2.5rem; margin-bottom: 40px; color: #7b2cbf; }
        .client-grid { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .client-logo { width: 150px; height: 100px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
        .client-logo:hover { border-color: #fff; transform: scale(1.05); }

        /* General */
        .cta-btn { margin-top: 30px; padding: 15px 40px; background: #7b2cbf; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .social-float { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .social-float a { background: #7b2cbf; color: white; padding: 15px; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(123, 44, 191, 0.4); }
    </style>
</head>
<body>

    <!-- Hero -->
    <section class="hero" data-aos="fade-in">
        <h1>KREOAXE</h1>
        <p>Digital. Creative. Performance.</p>
        <a href="https://wa.me/916232220297" class="cta-btn">Get Started</a>
    </section>

    <!-- Clients Section -->
    <section class="clients">
        <h2 data-aos="fade-up">Trusted By</h2>
        <div class="client-grid">
            <!-- आप यहाँ अपने क्लाइंट्स के लोगो की इमेज डाल सकते हैं -->
            <div class="client-logo" data-aos="zoom-in">Client 1</div>
            <div class="client-logo" data-aos="zoom-in" data-aos-delay="100">Client 2</div>
            <div class="client-logo" data-aos="zoom-in" data-aos-delay="200">Client 3</div>
            <div class="client-logo" data-aos="zoom-in" data-aos-delay="300">Client 4</div>
        </div>
    </section>

    <!-- Floating Contact -->
    <div class="social-float">
        <a href="tel:6232220297"><i class="fas fa-phone"></i></a>
        <a href="https://wa.me/916232220297"><i class="fab fa-whatsapp"></i></a>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script> AOS.init({ duration: 1200 }); </script>
</body>
</html>
